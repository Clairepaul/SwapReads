<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width"/>
        <title>Register | SwapReads</title>
        <link rel="icon" href="/assets/logo1.png" type="image/x-icon">
        <link rel="stylesheet" href="../css/login.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../js/auth.js" defer></script>
    </head>
    <body>
        <div class="container">
            <img class="loginimg" src="../assets/log.png" alt="SwapReads">
            <h2>CREATE ACCOUNT</h2>
            <form id="registerForm">
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" placeholder="Enter your full name" required>
                <br><br>
                <label for="registerEmail">Email:</label><br>
                <input type="email" id="registerEmail" placeholder="Enter your email" required>
                <br><br>
                <label for="registerPassword">Password:</label><br>
                <input type="password" id="registerPassword" placeholder="Create a password" minlength="6" required>
                <br><br>
                <label for="confirmPassword">Confirm Password:</label><br>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" minlength="6" required>
                <br><br>
                <button type="submit">Register</button>
            </form>
            <p id="authMessage" class="message"></p>
            <p>
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </body>
</html>
