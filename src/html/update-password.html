<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width"/>
        <title>Update Password | SwapReads</title>
        <link rel="icon" href="/assets/logo1.png" type="image/x-icon">
        <link rel="stylesheet" href="../css/login.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../js/auth.js" defer></script>
    </head>
    <body>
        <div class="container">
            <img class="loginimg" src="../assets/log.png" alt="SwapReads">
            <h2>UPDATE PASSWORD</h2>
            <form id="updatePasswordForm">
                <label for="newPassword">New Password:</label><br>
                <input type="password" id="newPassword" placeholder="Enter a new password" minlength="6" required>
                <br><br>
                <label for="confirmNewPassword">Confirm Password:</label><br>
                <input type="password" id="confirmNewPassword" placeholder="Confirm your new password" minlength="6" required>
                <br><br>
                <button type="submit">Update Password</button>
            </form>
            <p id="authMessage" class="message"></p>
            <p>
                Remembered your password? <a href="login.html">Login</a>
            </p>
        </div>
    </body>
</html>
