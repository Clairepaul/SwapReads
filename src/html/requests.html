<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width"/>
    <title>SwapReads</title>
    <link rel="icon" href="../assets/logo1.png">
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!--Header-->
        <header class="header">
            <div class="logo-sec">
                <img src="../assets/logo1.png" alt="logo">
                <div class="logo-text">
                <h2>SwapReads</h2>
                <p class="slogan">Where Readers Meet and Books Travel</p>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search books, authors and genres, & Nearby Readers...">
                <div id="searchResults" class="search-results hidden"></div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleNotifications()" id="notificationBtn">
                    🔔
                    <span class="badge" id="notificationCount">0</span>
                </button>
                <button class="icon-btn" id="messagesBtn">
                    💬
                    <span class="badge" id="messageCount">0</span>
                </button>
                <img id="profilePicture" src="../assets/user.jpg" alt="Profile" class="profile-picture">
            </div>
        </header>

        <!--SIDEBAR-->
        <aside class="sidebar">
            <div class="sidebar-top">
            <ul>
                <li>
                    <a href="dashboard.html">🏠 Dashboard</a>
                </li>
                <li >
                    <a href="mybooks.html">📚 My Books</a>
                </li>
                <li>
                    <a href="browse.html">🔍 Browse Books</a>
                </li>
                <li class="active">
                    <a href="requests.html">🔄 Swap Requests</a>
                </li>
                <li>
                    <a href="messages.html">💬 Messages</a>
                </li>
                <li>
                    <a href="wishlist.html">❤️ Wishlist</a>
                </li>
                <li>
                    <a href="readers.html">📍 Nearby Readers</a>
                </li>
            </ul>
            </div>

            <div class="sidebar-bottom">
                <div class="user-info">
                    <img id="sidebarProfilePic" src="../assets/user.jpg" alt="Profile">
                    <span id="sidebarUserName">Loading...</span>
                </div>
                <a href="profile.html" class="bottom-link">👤 Profile</a>
                <a href="settings.html" class="bottom-link">⚙️ Settings</a>
                <a href="#" id="logout-Btn" class="bottom-link">🚪 Logout</a>
            </div>
        </aside>

        <!--Main Section-->
        <main class="main-content">
            <section class="page-header">
                <h1>🔄 Swap Requests</h1>
            </section>

            <!--Incoming-->

            <section class="dashboard-section">
                <div class="sec-header">
                    <h2>Incoming Requests</h2>
                </div>

                <div id="incomingRequests" class="requests-grid"></div>
            </section>

            <!--Outgoing-->

            <section class="dashboard-section">
                <div class="sec-header">
                    <h2>My Requests</h2>
                </div>

                <div id="outgoingRequests" class="requests-grid"></div>
            </section>
        </main>

        <div id="notificationDropdown" class="notification-dropdown hidden">
            <h3>Notifications</h3>
            <div id="notificationsList"> </div>
        </div>

        <div id="toastContainer"></div>


        <script src="../js/toast.js"></script>
        <script src="../js/search.js"></script>
        <script src="../js/auth.js"></script>
        <script src="../js/notifications.js"></script>
        <script src="../js/requests.js"></script>

</body>
</html>
