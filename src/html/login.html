<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width"/>
        <title>SwapReads</title>
        <link rel="icon" href="/assets/logo1.png" type="image/x-icon">
        <link rel="stylesheet" href="../css/login.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../js/auth.js" defer></script>
    </head>
    <body>
        <div class="container">
            <img class="loginimg" src="../assets/log.png">
            <h2>WELCOME BACK!</h2>
            <form id="loginForm">
                <label for="email">Email:</label><br>
                <input type="email" id="email" placeholder="Enter your email" required>
                <br><br>
                <label for="password">Password:</label><br>
                <input type="password" id="password" placeholder="Enter your password" required>
                <br><br>
                <button type="submit">Login</button>
            </form>
            <p id="authMessage" class="message"></p>
            <p>
              <a href="reset.html">Forgot Password? Click to reset.</a>
            </p>
            <p>
                Don't have an account? <a href="register.html">Sign Up/Register</a>
            </p>
        </div>
    </body>
</html>
