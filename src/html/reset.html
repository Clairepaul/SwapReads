<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width"/>
        <title>Reset Password | SwapReads</title>
        <link rel="icon" href="/assets/logo1.png" type="image/x-icon">
        <link rel="stylesheet" href="../css/login.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../js/auth.js" defer></script>
    </head>
    <body>
        <div class="container">
            <img class="loginimg" src="../assets/log.png" alt="SwapReads">
            <h2>RESET PASSWORD</h2>
            <form id="resetForm">
                <label for="resetEmail">Email:</label><br>
                <input type="email" id="resetEmail" placeholder="Enter your email" required>
                <br><br>
                <button type="submit">Send Reset Link</button>
            </form>
            <p id="authMessage" class="message"></p>
            <p>
                Remembered your password? <a href="login.html">Login</a>
            </p>
        </div>
    </body>
</html>
